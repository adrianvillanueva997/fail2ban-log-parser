name: CI

on:
    push:
        branches: [main]
        paths:
            - "crates/fail2ban-log-parser-core/**"

    pull_request:
        branches: [main]
        paths:
            - "crates/fail2ban-log-parser-core/**"

env:
    CARGO_TERM_COLOR: always

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
              with:
                  toolchain: stable
                  cache: true
            - name: Install make
              uses: ./.github/actions/install-make
              with:
                  os: ubuntu
            - run: make check

    fmt:
        name: Rustfmt
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
              with:
                  toolchain: stable
                  cache: true
                  components: rustfmt
            - name: Install make
              uses: ./.github/actions/install-make
              with:
                  os: ubuntu
            - run: make fmt-check

    clippy:
        name: Clippy
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
              with:
                  toolchain: stable
                  cache: true
                  components: clippy
            - name: Install make
              uses: ./.github/actions/install-make
              with:
                  os: ubuntu
            - run: make clippy

    test:
        name: Test (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
              with:
                  toolchain: stable
                  cache: true
            - name: Install make
              uses: ./.github/actions/install-make
              with:
                  os: ${{ matrix.os }}
            - run: make test

    bench:
        name: Benchmarks
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
              with:
                  toolchain: stable
                  cache: true
            - name: Install make
              uses: ./.github/actions/install-make
              with:
                  os: ubuntu

            - name: Run sequential benchmarks
              run: cargo bench -p fail2ban-log-parser-core --bench parsing -- --output-format bencher | tee output.txt

            - name: Run parallel benchmarks
              run: cargo bench -p fail2ban-log-parser-core --bench parsing --features parallel -- parallel --output-format bencher >> output.txt

            - name: Store benchmark results
              uses: benchmark-action/github-action-benchmark@v1
              with:
                  name: Parser Benchmarks
                  tool: cargo
                  output-file-path: output.txt
                  benchmark-data-dir-path: .
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  auto-push: ${{ github.ref == 'refs/heads/main' }}
                  alert-threshold: "105%"
                  comment-on-alert: true
                  fail-on-alert: false
                  alert-comment-cc-users: "@adrianvillanueva997"

    msrv:
        name: MSRV
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
              with:
                  toolchain: "1.85.0"
            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
            - run: cargo check -p fail2ban-log-parser-core --all-features
