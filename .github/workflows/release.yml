name: Release

on:
    push:
        tags:
            - "v*"

env:
    CARGO_TERM_COLOR: always

jobs:
    publish:
        name: Publish to crates.io
        runs-on: ubuntu-latest
        environment: crates-io
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
              with:
                  toolchain: stable
            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
            - name: Verify version matches tag
              run: |
                  TAG="${GITHUB_REF#refs/tags/v}"
                  CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
                    | jq -r '.packages[] | select(.name == "fail2ban-log-parser-core") | .version')
                  if [ "$TAG" != "$CARGO_VERSION" ]; then
                    echo "::error::Tag v$TAG does not match Cargo.toml version $CARGO_VERSION"
                    exit 1
                  fi

            - name: Dry-run publish
              run: cargo publish -p fail2ban-log-parser-core --dry-run

            - name: Publish
              run: cargo publish -p fail2ban-log-parser-core
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    github-release:
        name: GitHub Release
        needs: publish
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
