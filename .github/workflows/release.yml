name: Release

on:
    push:
        tags:
            - "v*"

env:
    CARGO_TERM_COLOR: always

jobs:
    ci:
        name: CI checks
        uses: ./.github/workflows/ci.yml

    publish:
        name: Publish to crates.io
        needs: ci
        runs-on: ubuntu-latest
        environment: crates-io
        steps:
            - uses: actions/checkout@v6
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2

            - name: Verify version matches tag
              run: |
                  TAG="${GITHUB_REF#refs/tags/v}"
                  CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
                    | jq -r '.packages[] | select(.name == "fail2ban-log-parser-core") | .version')
                  if [ "$TAG" != "$CARGO_VERSION" ]; then
                    echo "::error::Tag v$TAG does not match Cargo.toml version $CARGO_VERSION"
                    exit 1
                  fi

            - name: Dry-run publish
              run: cargo publish -p fail2ban-log-parser-core --dry-run

            - name: Publish
              run: cargo publish -p fail2ban-log-parser-core
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    github-release:
        name: GitHub Release
        needs: publish
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6
            - uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
