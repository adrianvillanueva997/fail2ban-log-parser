name: CI - JS Bindings

on:
    push:
        branches: [main]
        paths:
            - "bindings/js-fail2ban-log-parser/**"
    pull_request:
        branches: [main]
        paths:
            - "bindings/js-fail2ban-log-parser/**"

permissions:
    contents: write
    pull-requests: write

jobs:
    js-bindings:
        name: JS bindings build+test
        runs-on: ${{ matrix.os }}
        defaults:
            run:
                working-directory: bindings/js-fail2ban-log-parser

        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
                node-version: [20, 22, 24]

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm

            - run: npm install -g pnpm

            - name: Install dependencies
              run: pnpm install

            - name: Build bindings
              run: pnpm build

            - name: Run tests
              run: pnpm test

    benchmark:
        name: Benchmark JS bindings
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: bindings/js-fail2ban-log-parser

        permissions:
            contents: write
            pull-requests: write

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 20
                  cache: npm

            - name: Install pnpm
              run: npm install -g pnpm

            - name: Install dependencies
              run: pnpm install

            - name: Build bindings
              run: pnpm build

            - name: Run benchmarks
              run: pnpm bench > ../../benchmark-js-results.txt 2>&1

            - name: Store benchmark results
              uses: benchmark-action/github-action-benchmark@v1
              with:
                  name: JS Bindings Benchmarks
                  tool: customBiggerIsBetter
                  output-file-path: benchmark-js-results.txt
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  auto-push: ${{ github.ref == 'refs/heads/main' }}
                  alert-threshold: 110%
                  comment-on-alert: true
                  fail-on-alert: false
