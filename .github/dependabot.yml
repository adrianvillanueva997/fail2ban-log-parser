version: 2

updates:
    - package-ecosystem: cargo
      directory: /
      schedule:
          interval: weekly
      groups:
          rust-dependencies:
              patterns:
                  - "*"
      commit-message:
          prefix: "deps(rust):"

    - package-ecosystem: npm
      directory: /bindings/js-fail2ban-log-parser
      schedule:
          interval: weekly
      groups:
          js-dependencies:
              patterns:
                  - "*"
      commit-message:
          prefix: "deps(js):"

    - package-ecosystem: pip
      directory: /bindings/py-fail2ban-log-parser
      schedule:
          interval: weekly
      groups:
          python-dependencies:
              patterns:
                  - "*"
      commit-message:
          prefix: "deps(python):"

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
      groups:
          github-actions:
              patterns:
                  - "*"
      commit-message:
          prefix: "deps(actions):"
